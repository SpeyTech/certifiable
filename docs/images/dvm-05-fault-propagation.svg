<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="16" text-anchor="middle" font-size="12" fill="#5F5E5A">Mathematical closure and fault propagation — §3.2 and §8.5</text>

<!-- Valid state -->
<rect x="260" y="28" width="160" height="52" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="50" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C" dominant-baseline="central">s ∈ S</text>
<text x="340" y="68" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Valid canonical state</text>

<line x1="340" y1="80" x2="340" y2="112" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- DVM computation -->
<rect x="230" y="114" width="220" height="52" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="136" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" dominant-baseline="central">F : S → S</text>
<text x="340" y="154" text-anchor="middle" font-size="12" fill="#534AB7" dominant-baseline="central">DVM computation (§3.2)</text>

<!-- Three failure arrows -->
<line x1="280" y1="166" x2="160" y2="200" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="166" x2="340" y2="200" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="166" x2="520" y2="200" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="130" y="192" text-anchor="middle" font-size="11" fill="#5F5E5A">div/0</text>
<text x="340" y="196" text-anchor="middle" font-size="11" fill="#5F5E5A">overflow</text>
<text x="556" y="192" text-anchor="middle" font-size="11" fill="#5F5E5A">domain error</text>

<!-- Three s_faulted boxes -->
<rect x="60" y="202" width="200" height="52" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="160" y="220" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">s_faulted ∈ S</text>
<text x="160" y="238" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">Saturated + fault flag</text>

<rect x="240" y="202" width="200" height="52" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="220" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">s_faulted ∈ S</text>
<text x="340" y="238" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">Saturated + fault flag</text>

<rect x="420" y="202" width="200" height="52" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="520" y="220" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">s_faulted ∈ S</text>
<text x="520" y="238" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">Saturated + fault flag</text>

<text x="340" y="274" text-anchor="middle" font-size="11" fill="#5F5E5A">All three paths produce a valid member of S — no trap, no undefined behaviour (§3.2)</text>

<!-- Down arrows to propagation strategies -->
<line x1="160" y1="254" x2="160" y2="292" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="254" x2="340" y2="292" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="520" y1="254" x2="520" y2="292" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Three propagation strategy boxes -->
<rect x="60" y="294" width="200" height="56" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="160" y="316" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Identity propagation</text>
<text x="160" y="336" text-anchor="middle" font-size="12" fill="#5F5E5A" dominant-baseline="central">Fₙ(s_f) = s_f</text>

<rect x="240" y="294" width="200" height="56" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="316" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Degraded mode</text>
<text x="340" y="336" text-anchor="middle" font-size="12" fill="#5F5E5A" dominant-baseline="central">Fallback computation</text>

<rect x="420" y="294" width="200" height="56" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="520" y="316" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Explicit handling</text>
<text x="520" y="336" text-anchor="middle" font-size="12" fill="#5F5E5A" dominant-baseline="central">Transform fault vector</text>

<text x="340" y="370" text-anchor="middle" font-size="11" fill="#5F5E5A">Chosen strategy MUST be declared. Fault vector MUST NOT be silently cleared (§8.5).</text>
<text x="340" y="386" text-anchor="middle" font-size="11" fill="#5F5E5A">A fault is a routed state transition — not a crash.</text>
</svg>
