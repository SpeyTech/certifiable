<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 680" width="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8892B0" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.06" />
    </filter>
  </defs>

  <text x="475" y="40" font-size="18" font-weight="600" text-anchor="middle" fill="#111827">Mathematical closure and fault propagation — §3.2, §8.5</text>

  <!--
    Layout:
      Valid state:    centred at x=475, y=65, w=280 h=70
      Arrow down:     y=135 → y=165
      DVM computation: centred x=475, y=165, w=340 h=80
      Three diverging arrows from bottom of DVM box to three fault boxes
      Three fault boxes at y=310, each w=240 h=80, gaps=25
        Left:   x=55   centre=175
        Centre: x=355  centre=475
        Right:  x=655  centre=775
      Arrows exit DVM box bottom at: left=355, centre=475, right=595  (y=245)
        to: left centre=175, centre=475, right=775  (y=310)
        L-bent paths to avoid crossing
      Closure note: y=410
      Arrows down to strategy boxes: y=420 → y=450
      Three strategy boxes: y=450 h=100
      Strategy context notes below.
  -->

  <!-- Valid canonical state (top, centred) -->
  <g transform="translate(335, 65)">
    <rect width="280" height="70" rx="8" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="140" y="28" font-size="16" font-weight="bold" text-anchor="middle" fill="#065F46">s ∈ S</text>
    <text x="140" y="52" font-size="14" text-anchor="middle" fill="#047857">Valid canonical state</text>
  </g>

  <!-- Arrow down to DVM computation -->
  <path d="M 475 135 L 475 163" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DVM computation box -->
  <g transform="translate(305, 165)">
    <rect width="340" height="80" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="170" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#4C1D95">F : S → S</text>
    <text x="170" y="54" font-size="14" text-anchor="middle" fill="#6D28D9">DVM computation (§3.2)</text>
    <text x="170" y="72" font-size="12" font-style="italic" text-anchor="middle" fill="#7C3AED">Total function — no undefined behaviour, no hardware traps</text>
  </g>

  <!--
    DVM box bottom = y=245
    Three exit points: x=370 (left branch), x=475 (centre), x=580 (right branch)
    Three fault box centres: x=175, x=475, x=775
    Paths:
      Left:   M 370 245 L 370 295 L 175 295 L 175 308   (L-bend to clear centre box)
      Centre: M 475 245 L 475 308
      Right:  M 580 245 L 580 295 L 775 295 L 775 308
  -->

  <!-- Left branch: division by zero -->
  <path d="M 370 245 L 370 293 L 175 293 L 175 308" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="260" y="282" font-size="12" text-anchor="middle" fill="#9CA3AF">division by zero</text>

  <!-- Centre branch: overflow -->
  <path d="M 475 245 L 475 308" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="504" y="278" font-size="12" text-anchor="start" fill="#9CA3AF">overflow</text>

  <!-- Right branch: invalid domain -->
  <path d="M 580 245 L 580 293 L 775 293 L 775 308" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="690" y="282" font-size="12" text-anchor="middle" fill="#9CA3AF">invalid domain</text>

  <!-- Three s_faulted boxes -->
  <!-- Left -->
  <g transform="translate(55, 310)">
    <rect width="240" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="28" font-size="14" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">s_faulted ∈ S</text>
    <text x="120" y="52" font-size="13" text-anchor="middle" fill="#92400E">Result saturated</text>
    <text x="120" y="70" font-size="12" font-family="monospace" text-anchor="middle" fill="#B45309">division_by_zero flag set</text>
  </g>

  <!-- Centre -->
  <g transform="translate(355, 310)">
    <rect width="240" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="28" font-size="14" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">s_faulted ∈ S</text>
    <text x="120" y="52" font-size="13" text-anchor="middle" fill="#92400E">Result saturated to INT_MAX</text>
    <text x="120" y="70" font-size="12" font-family="monospace" text-anchor="middle" fill="#B45309">overflow flag set</text>
  </g>

  <!-- Right -->
  <g transform="translate(655, 310)">
    <rect width="240" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="28" font-size="14" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">s_faulted ∈ S</text>
    <text x="120" y="52" font-size="13" text-anchor="middle" fill="#92400E">Result clamped</text>
    <text x="120" y="70" font-size="12" font-family="monospace" text-anchor="middle" fill="#B45309">invalid_domain flag set</text>
  </g>

  <!-- Closure note -->
  <text x="475" y="415" font-size="13" font-style="italic" text-anchor="middle" fill="#374151">All three paths produce a valid member of S — fault condition is a routed state transition, not a crash (§3.2)</text>

  <!-- Arrows down to propagation strategy boxes -->
  <path d="M 175 390 L 175 448" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 475 390 L 475 448" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 775 390 L 775 448" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Three propagation strategy boxes -->
  <!-- Identity propagation -->
  <g transform="translate(55, 450)">
    <rect width="240" height="100" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="28" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E293B">Identity propagation</text>
    <line x1="15" y1="38" x2="225" y2="38" stroke="#E2E8F0" stroke-width="1"/>
    <text x="120" y="58" font-size="13" font-family="monospace" text-anchor="middle" fill="#475569">Fₙ(s_faulted) = s_faulted</text>
    <text x="120" y="80" font-size="12" font-style="italic" text-anchor="middle" fill="#64748B">Fault passes through unchanged</text>
  </g>

  <!-- Degraded mode -->
  <g transform="translate(355, 450)">
    <rect width="240" height="100" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="28" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E293B">Degraded mode</text>
    <line x1="15" y1="38" x2="225" y2="38" stroke="#E2E8F0" stroke-width="1"/>
    <text x="120" y="58" font-size="13" text-anchor="middle" fill="#475569">Predefined fallback</text>
    <text x="120" y="76" font-size="13" text-anchor="middle" fill="#475569">computation executes</text>
    <text x="120" y="96" font-size="12" font-style="italic" text-anchor="middle" fill="#64748B">Aerospace / flight control</text>
  </g>

  <!-- Explicit fault handling -->
  <g transform="translate(655, 450)">
    <rect width="240" height="100" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="28" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E293B">Explicit handling</text>
    <line x1="15" y1="38" x2="225" y2="38" stroke="#E2E8F0" stroke-width="1"/>
    <text x="120" y="58" font-size="13" text-anchor="middle" fill="#475569">Fault vector transformed</text>
    <text x="120" y="76" font-size="13" text-anchor="middle" fill="#475569">by documented rules</text>
    <text x="120" y="96" font-size="12" font-style="italic" text-anchor="middle" fill="#64748B">Domain-specific recovery</text>
  </g>

  <!-- Footer rules -->
  <text x="475" y="588" font-size="13" font-weight="bold" text-anchor="middle" fill="#374151">Chosen strategy MUST be declared in implementation documentation and verified under §9.</text>
  <text x="475" y="610" font-size="13" text-anchor="middle" fill="#6B7280">Fault vector MUST NOT be silently cleared at any pipeline stage (§8.5).</text>
  <text x="475" y="632" font-size="13" font-style="italic" text-anchor="middle" fill="#6B7280">Under no circumstances SHALL a computation silently clear or ignore a fault vector — §8.5</text>
</svg>
