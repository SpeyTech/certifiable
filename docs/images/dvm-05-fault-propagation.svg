<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8892B0" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>
  </defs>

  <text x="400" y="36" font-size="16" font-weight="600" text-anchor="middle" fill="#111827">Mathematical closure and fault propagation — §3.2, §8.5</text>

  <!--
    Layout at 800px:
    Valid state box:     centred x=400, y=55, w=260 h=64   right/bottom y=119
    DVM computation box: centred x=400, y=150, w=310 h=76  bottom=226
    Three fault boxes:   each w=205 gap=20
      Left:   x=20   centre=122
      Centre: x=295  centre=397
      Right:  x=575  centre=677
    DVM exit points for branches: x=310 (→left), x=400 (→centre), x=490 (→right)  y=226
    Branch targets (top of fault boxes) y=295
    L-bent paths:
      Left:   M 310 226 L 310 280 L 122 280 L 122 293
      Centre: M 400 226 L 400 293
      Right:  M 490 226 L 490 280 L 677 280 L 677 293
    Fault box bottoms y=375
    Closure note y=392
    Strategy arrows: fault bottom → strategy top  y=380→y=415
    Strategy boxes y=415 h=96
    Strategy bottom y=511
    Footer y=540+
  -->

  <!-- Valid state -->
  <g transform="translate(270, 55)">
    <rect width="260" height="64" rx="8" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="130" y="26" font-size="15" font-weight="bold" text-anchor="middle" fill="#065F46">s ∈ S</text>
    <text x="130" y="48" font-size="13" text-anchor="middle" fill="#047857">Valid canonical state</text>
  </g>

  <!-- Arrow down to DVM computation -->
  <path d="M 400 119 L 400 148" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DVM computation -->
  <g transform="translate(245, 150)">
    <rect width="310" height="76" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="155" y="28" font-size="15" font-weight="bold" text-anchor="middle" fill="#4C1D95">F : S → S</text>
    <text x="155" y="50" font-size="13" text-anchor="middle" fill="#6D28D9">DVM computation (§3.2)</text>
    <text x="155" y="68" font-size="11" font-style="italic" text-anchor="middle" fill="#7C3AED">Total function — no traps, no undefined behaviour</text>
  </g>

  <!-- Three branching arrows from DVM box bottom (y=226) -->
  <!-- Left branch → div/0 -->
  <path d="M 310 226 L 310 278 L 122 278 L 122 293" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="210" y="268" font-size="11" text-anchor="middle" fill="#9CA3AF">division by zero</text>

  <!-- Centre branch → overflow -->
  <path d="M 400 226 L 400 293" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="418" y="262" font-size="11" text-anchor="start" fill="#9CA3AF">overflow</text>

  <!-- Right branch → invalid domain -->
  <path d="M 490 226 L 490 278 L 677 278 L 677 293" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="590" y="268" font-size="11" text-anchor="middle" fill="#9CA3AF">invalid domain</text>

  <!-- Three s_faulted boxes (y=295 h=80) -->
  <g transform="translate(20, 295)">
    <rect width="205" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="102" y="24"  font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">s_faulted ∈ S</text>
    <text x="102" y="46"  font-size="12" text-anchor="middle" fill="#92400E">Result saturated</text>
    <text x="102" y="64"  font-size="11" font-family="monospace" text-anchor="middle" fill="#B45309">division_by_zero flag</text>
  </g>

  <g transform="translate(295, 295)">
    <rect width="205" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="102" y="24"  font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">s_faulted ∈ S</text>
    <text x="102" y="46"  font-size="12" text-anchor="middle" fill="#92400E">Saturated to INT_MAX</text>
    <text x="102" y="64"  font-size="11" font-family="monospace" text-anchor="middle" fill="#B45309">overflow flag</text>
  </g>

  <g transform="translate(575, 295)">
    <rect width="205" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="102" y="24"  font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">s_faulted ∈ S</text>
    <text x="102" y="46"  font-size="12" text-anchor="middle" fill="#92400E">Result clamped</text>
    <text x="102" y="64"  font-size="11" font-family="monospace" text-anchor="middle" fill="#B45309">invalid_domain flag</text>
  </g>

  <!-- Closure note -->
  <text x="400" y="398" font-size="12" font-style="italic" text-anchor="middle" fill="#374151">All three paths produce a valid member of S — fault condition is a routed state transition, not a crash (§3.2)</text>

  <!-- Down arrows to strategy boxes -->
  <path d="M 122 375 L 122 413" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 397 375 L 397 413" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 677 375 L 677 413" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Three strategy boxes (y=415 h=96) -->
  <g transform="translate(20, 415)">
    <rect width="205" height="96" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="102" y="24"  font-size="13" font-weight="bold" text-anchor="middle" fill="#1E293B">Identity propagation</text>
    <line x1="12" y1="34" x2="193" y2="34" stroke="#E2E8F0" stroke-width="1"/>
    <text x="102" y="54"  font-size="12" font-family="monospace" text-anchor="middle" fill="#475569">Fₙ(s_f) = s_f</text>
    <text x="102" y="74"  font-size="12" text-anchor="middle" fill="#64748B">Fault passes unchanged</text>
    <text x="102" y="90"  font-size="11" font-style="italic" text-anchor="middle" fill="#94A3B8">Halt-like path</text>
  </g>

  <g transform="translate(295, 415)">
    <rect width="205" height="96" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="102" y="24"  font-size="13" font-weight="bold" text-anchor="middle" fill="#1E293B">Degraded mode</text>
    <line x1="12" y1="34" x2="193" y2="34" stroke="#E2E8F0" stroke-width="1"/>
    <text x="102" y="54"  font-size="12" text-anchor="middle" fill="#475569">Predefined fallback</text>
    <text x="102" y="72"  font-size="12" text-anchor="middle" fill="#475569">computation executes</text>
    <text x="102" y="90"  font-size="11" font-style="italic" text-anchor="middle" fill="#94A3B8">Aerospace / flight control</text>
  </g>

  <g transform="translate(575, 415)">
    <rect width="205" height="96" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="102" y="24"  font-size="13" font-weight="bold" text-anchor="middle" fill="#1E293B">Explicit handling</text>
    <line x1="12" y1="34" x2="193" y2="34" stroke="#E2E8F0" stroke-width="1"/>
    <text x="102" y="54"  font-size="12" text-anchor="middle" fill="#475569">Fault vector transformed</text>
    <text x="102" y="72"  font-size="12" text-anchor="middle" fill="#475569">by documented rules</text>
    <text x="102" y="90"  font-size="11" font-style="italic" text-anchor="middle" fill="#94A3B8">Domain-specific recovery</text>
  </g>

  <!-- Footer rules -->
  <text x="400" y="538" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">Chosen strategy MUST be declared in implementation documentation and verified under §9.</text>
  <text x="400" y="558" font-size="12" text-anchor="middle" fill="#6B7280">Fault vector MUST NOT be silently cleared at any pipeline stage (§8.5).</text>
  <text x="400" y="578" font-size="12" font-style="italic" text-anchor="middle" fill="#9CA3AF">Under no circumstances SHALL a computation silently clear or ignore a fault vector — §8.5</text>
</svg>
