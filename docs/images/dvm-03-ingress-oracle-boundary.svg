<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="16" text-anchor="middle" font-size="12" fill="#5F5E5A">Ingress Oracle boundary — §6.2</text>

<!-- External environment -->
<rect x="30" y="28" width="180" height="160" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="120" y="60" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">External environment</text>
<text x="120" y="80" text-anchor="middle" font-size="12" fill="#993C1D">Nondeterministic</text>
<rect x="50" y="100" width="140" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="120" y="114" text-anchor="middle" font-size="12" fill="#2C2C2A" dominant-baseline="central">Sensors / clocks / feeds</text>
<rect x="50" y="136" width="140" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="120" y="150" text-anchor="middle" font-size="12" fill="#2C2C2A" dominant-baseline="central">Floating-point / raw bytes</text>

<line x1="210" y1="108" x2="246" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Oracle -->
<rect x="248" y="28" width="184" height="240" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="56" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Ingress Oracle</text>
<text x="340" y="76" text-anchor="middle" font-size="11" fill="#534AB7">O : E → (s ∈ S, L_ingress)</text>
<rect x="264" y="96" width="152" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="110" text-anchor="middle" font-size="12" fill="#2C2C2A" dominant-baseline="central">Normalise &amp; quantise</text>
<rect x="264" y="132" width="152" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="146" text-anchor="middle" font-size="12" fill="#2C2C2A" dominant-baseline="central">Encode to §4.3 primitives</text>
<rect x="264" y="168" width="152" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="182" text-anchor="middle" font-size="12" fill="#2C2C2A" dominant-baseline="central">Commit L_ingress</text>
<rect x="264" y="204" width="152" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="218" text-anchor="middle" font-size="12" fill="#2C2C2A" dominant-baseline="central">Emit canonical state s</text>

<line x1="432" y1="108" x2="466" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="432" y1="218" x2="466" y2="218" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Ingress commitment -->
<rect x="468" y="28" width="180" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="558" y="60" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Ingress commitment</text>
<text x="558" y="80" text-anchor="middle" font-size="12" fill="#0F6E56">L_ingress</text>
<text x="558" y="118" text-anchor="middle" font-size="11" fill="#5F5E5A">What the world provided</text>

<!-- Canonical state output -->
<rect x="468" y="188" width="180" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="558" y="220" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Canonical state</text>
<text x="558" y="240" text-anchor="middle" font-size="12" fill="#0F6E56">s ∈ S</text>
<text x="558" y="280" text-anchor="middle" font-size="11" fill="#5F5E5A">DVM execution input</text>

<line x1="340" y1="268" x2="340" y2="296" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- DVM execution -->
<rect x="240" y="298" width="200" height="52" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="320" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">DVM execution</text>
<text x="340" y="338" text-anchor="middle" font-size="12" fill="#534AB7">Deterministic — F : S → S</text>

<!-- Zone labels -->
<line x1="30" y1="340" x2="238" y2="340" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="134" y="358" text-anchor="middle" font-size="11" fill="#888780">Nondeterministic zone</text>
<line x1="442" y1="340" x2="650" y2="340" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="546" y="358" text-anchor="middle" font-size="11" fill="#888780">Evidence records</text>

<text x="340" y="390" text-anchor="middle" font-size="11" fill="#5F5E5A">The Oracle boundary is the sole permitted entry point for external state (§3.4)</text>
</svg>
