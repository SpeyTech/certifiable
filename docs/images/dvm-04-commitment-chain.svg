<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 640" width="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8892B0" />
    </marker>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8892B0" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.06" />
    </filter>
  </defs>

  <text x="475" y="40" font-size="18" font-weight="600" text-anchor="middle" fill="#111827">Cryptographic commitment chain and replay theorem — §7.2, §7.3</text>

  <!--
    Three rows (s0→s1→st) each with: State box | arrow | commit() box | arrow | Ledger box
    Plus a vertical chaining arrow from Ledger of row N down to Ledger of row N+1
    Plus a Tamper evidence callout on the right.

    Column layout (viewBox w=950):
      State boxes:   x=40   w=130  right=170
      Arrow 1:       170→210
      Commit boxes:  x=210  w=200  right=410
      Arrow 2:       410→450
      Ledger boxes:  x=450  w=220  right=670
      Tamper callout: x=700 w=210

    Row heights = 80px, gap between rows = 30px
    Row 1 top: y=80   mid=120
    Row 2 top: y=190  mid=230
    Row 3 top: y=300  mid=340

    Vertical chaining arrows (right side of ledger box):
      L0 bottom (y=160) → L1 top (y=190): x=560
      L1 bottom (y=270) → Lt top (y=300): x=560  (dashed to indicate ellipsis)

    Formula text between rows.
  -->

  <!-- Column headers -->
  <text x="105"  y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B7280">State</text>
  <text x="310"  y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B7280">State commitment</text>
  <text x="560"  y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B7280">Ledger digest</text>

  <!-- ══ ROW 1: s₀ ══ -->
  <!-- s₀ state box -->
  <g transform="translate(40, 80)">
    <rect width="130" height="80" rx="8" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="32" font-size="20" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#065F46">s₀</text>
    <text x="65" y="58" font-size="13" text-anchor="middle" fill="#047857">Initial state</text>
  </g>

  <!-- Arrow s₀ → commit -->
  <path d="M 170 120 L 200 120" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="112" font-size="11" text-anchor="middle" fill="#9CA3AF">commit</text>

  <!-- commit(s₀) box -->
  <g transform="translate(210, 80)">
    <rect width="200" height="80" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="30" font-size="15" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#4C1D95">commit(s₀)</text>
    <text x="100" y="52" font-size="12" font-family="monospace" text-anchor="middle" fill="#6D28D9">DVM:STATE:v1</text>
    <text x="100" y="70" font-size="11" font-style="italic" text-anchor="middle" fill="#7C3AED">H(tag ‖ len ‖ state)</text>
  </g>

  <!-- Arrow commit(s₀) → L₀ -->
  <path d="M 410 120 L 440 120" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="425" y="112" font-size="11" text-anchor="middle" fill="#9CA3AF">H(tag ‖ ·)</text>

  <!-- L₀ ledger box -->
  <g transform="translate(450, 80)">
    <rect width="220" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="30" font-size="20" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">L₀</text>
    <text x="110" y="52" font-size="12" font-family="monospace" text-anchor="middle" fill="#92400E">DVM:LEDGER:v1</text>
    <text x="110" y="70" font-size="11" font-style="italic" text-anchor="middle" fill="#B45309">H(LEDGER:v1 ‖ commit(s₀))</text>
  </g>

  <!-- Formula row 1 -->
  <text x="350" y="178" font-size="12" font-family="monospace" text-anchor="middle" fill="#6B7280">L₀ = H(DVM:LEDGER:v1 ‖ commit(s₀))</text>

  <!-- Vertical chaining arrow L₀ → L₁ -->
  <path d="M 560 160 L 560 188" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ══ ROW 2: s₁ ══ -->
  <g transform="translate(40, 190)">
    <rect width="130" height="80" rx="8" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="32" font-size="20" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#065F46">s₁</text>
    <text x="65" y="58" font-size="13" text-anchor="middle" fill="#047857">Next state</text>
  </g>

  <path d="M 170 230 L 200 230" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="222" font-size="11" text-anchor="middle" fill="#9CA3AF">commit</text>

  <g transform="translate(210, 190)">
    <rect width="200" height="80" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="30" font-size="15" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#4C1D95">commit(s₁)</text>
    <text x="100" y="52" font-size="12" font-family="monospace" text-anchor="middle" fill="#6D28D9">DVM:STATE:v1</text>
    <text x="100" y="70" font-size="11" font-style="italic" text-anchor="middle" fill="#7C3AED">H(tag ‖ len ‖ state)</text>
  </g>

  <path d="M 410 230 L 440 230" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="425" y="222" font-size="11" text-anchor="middle" fill="#9CA3AF">H(tag ‖ L₀ ‖ ·)</text>

  <g transform="translate(450, 190)">
    <rect width="220" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="30" font-size="20" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">L₁</text>
    <text x="110" y="52" font-size="12" font-family="monospace" text-anchor="middle" fill="#92400E">DVM:LEDGER:v1</text>
    <text x="110" y="70" font-size="11" font-style="italic" text-anchor="middle" fill="#B45309">H(LEDGER:v1 ‖ L₀ ‖ commit(s₁))</text>
  </g>

  <!-- Formula row 2 -->
  <text x="350" y="288" font-size="12" font-family="monospace" text-anchor="middle" fill="#6B7280">L₁ = H(DVM:LEDGER:v1 ‖ L₀ ‖ commit(s₁))</text>

  <!-- Vertical chaining arrow L₁ → Lₜ (dashed = ellipsis) -->
  <path d="M 560 270 L 560 298" stroke="#8892B0" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="574" y="286" font-size="11" fill="#9CA3AF">⋮</text>

  <!-- ══ ROW 3: sₜ ══ -->
  <g transform="translate(40, 300)">
    <rect width="130" height="80" rx="8" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="32" font-size="20" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#065F46">sₜ</text>
    <text x="65" y="58" font-size="13" text-anchor="middle" fill="#047857">State at step t</text>
  </g>

  <path d="M 170 340 L 200 340" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="332" font-size="11" text-anchor="middle" fill="#9CA3AF">commit</text>

  <g transform="translate(210, 300)">
    <rect width="200" height="80" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="30" font-size="15" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#4C1D95">commit(sₜ)</text>
    <text x="100" y="52" font-size="12" font-family="monospace" text-anchor="middle" fill="#6D28D9">DVM:STATE:v1</text>
    <text x="100" y="70" font-size="11" font-style="italic" text-anchor="middle" fill="#7C3AED">H(tag ‖ len ‖ state)</text>
  </g>

  <path d="M 410 340 L 440 340" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="425" y="332" font-size="11" text-anchor="middle" fill="#9CA3AF">H(tag ‖ Lₜ₋₁ ‖ ·)</text>

  <g transform="translate(450, 300)">
    <rect width="220" height="80" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="30" font-size="20" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">Lₜ</text>
    <text x="110" y="52" font-size="12" font-family="monospace" text-anchor="middle" fill="#92400E">DVM:LEDGER:v1</text>
    <text x="110" y="70" font-size="11" font-style="italic" text-anchor="middle" fill="#B45309">H(LEDGER:v1 ‖ Lₜ₋₁ ‖ commit(sₜ))</text>
  </g>

  <!-- Tamper evidence callout (right side, spanning rows 1–3) -->
  <rect x="700" y="80" width="210" height="300" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5" stroke-dasharray="6 4" filter="url(#shadow)"/>
  <text x="805" y="108" font-size="14" font-weight="bold" text-anchor="middle" fill="#9A3412">Tamper evidence</text>
  <line x1="720" y1="120" x2="890" y2="120" stroke="#FDBA74" stroke-width="0.75"/>
  <text x="805" y="148" font-size="13" text-anchor="middle" fill="#78350F">Any modification to</text>
  <text x="805" y="168" font-size="13" text-anchor="middle" fill="#78350F">any intermediate sₙ</text>
  <text x="805" y="188" font-size="13" text-anchor="middle" fill="#78350F">produces a different</text>
  <text x="805" y="208" font-size="14" font-family="monospace" text-anchor="middle" fill="#B45309">commit(sₙ)</text>
  <text x="805" y="232" font-size="13" text-anchor="middle" fill="#78350F">which invalidates</text>
  <text x="805" y="252" font-size="14" font-family="monospace" text-anchor="middle" fill="#B45309">Lₙ, Lₙ₊₁ … Lₜ</text>
  <text x="805" y="280" font-size="13" text-anchor="middle" fill="#78350F">Detectable without</text>
  <text x="805" y="300" font-size="13" text-anchor="middle" fill="#78350F">any shared secret</text>
  <text x="805" y="360" font-size="12" font-style="italic" text-anchor="middle" fill="#9A3412">No trusted third party required</text>

  <!-- Leader from ledger column to tamper box -->
  <path d="M 670 230 L 698 230" stroke="#FDBA74" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Replay theorem footer -->
  <rect x="40" y="415" width="830" height="85" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="455" y="440" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E293B">Deterministic Replay Theorem — §7.3</text>
  <text x="455" y="463" font-size="13" text-anchor="middle" fill="#374151">Any conforming implementation given identical s₀ and program P MUST reproduce</text>
  <text x="455" y="483" font-size="13" text-anchor="middle" fill="#374151">(L₀, L₁, … Lₜ) byte-identically. The chain is independently auditable by any party.</text>

  <text x="475" y="540" font-size="13" font-style="italic" text-anchor="middle" fill="#6B7280">Independent auditability: certification review, regulatory audit, and multi-party verification require no shared secrets.</text>
</svg>
