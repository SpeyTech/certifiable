<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="16" text-anchor="middle" font-size="12" fill="#5F5E5A">Cryptographic commitment chain and replay theorem — §7.2, §7.3</text>

<!-- Row 1: s0 -->
<rect x="40" y="32" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="100" y="50" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C" dominant-baseline="central">s₀</text>
<text x="100" y="68" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Initial state</text>
<line x1="160" y1="54" x2="200" y2="54" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="180" y="44" text-anchor="middle" font-size="11" fill="#5F5E5A">commit</text>
<rect x="202" y="32" width="136" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="270" y="50" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" dominant-baseline="central">commit(s₀)</text>
<text x="270" y="68" text-anchor="middle" font-size="12" fill="#534AB7" dominant-baseline="central">DVM:STATE:v1</text>
<line x1="338" y1="54" x2="376" y2="54" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="357" y="44" text-anchor="middle" font-size="11" fill="#5F5E5A">H(tag ∥ ·)</text>
<rect x="378" y="32" width="136" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="446" y="50" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">L₀</text>
<text x="446" y="68" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">DVM:LEDGER:v1</text>
<text x="340" y="94" text-anchor="middle" font-size="11" fill="#5F5E5A">L₀ = H(DVM:LEDGER:v1 ∥ commit(s₀))</text>
<line x1="446" y1="76" x2="446" y2="106" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Row 2: s1 -->
<rect x="40" y="116" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="100" y="134" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C" dominant-baseline="central">s₁</text>
<text x="100" y="152" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Next state</text>
<line x1="160" y1="138" x2="200" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="180" y="128" text-anchor="middle" font-size="11" fill="#5F5E5A">commit</text>
<rect x="202" y="116" width="136" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="270" y="134" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" dominant-baseline="central">commit(s₁)</text>
<text x="270" y="152" text-anchor="middle" font-size="12" fill="#534AB7" dominant-baseline="central">DVM:STATE:v1</text>
<line x1="338" y1="138" x2="376" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="378" y="116" width="136" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="446" y="134" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">L₁</text>
<text x="446" y="152" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">H(tag ∥ L₀ ∥ commit(s₁))</text>
<text x="290" y="176" text-anchor="middle" font-size="11" fill="#5F5E5A">L₁ = H(DVM:LEDGER:v1 ∥ L₀ ∥ commit(s₁))</text>
<line x1="446" y1="160" x2="446" y2="190" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Row 3: st -->
<rect x="40" y="200" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="100" y="218" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C" dominant-baseline="central">sₜ</text>
<text x="100" y="236" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">State at step t</text>
<line x1="160" y1="222" x2="200" y2="222" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="202" y="200" width="136" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="270" y="218" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" dominant-baseline="central">commit(sₜ)</text>
<text x="270" y="236" text-anchor="middle" font-size="12" fill="#534AB7" dominant-baseline="central">DVM:STATE:v1</text>
<line x1="338" y1="222" x2="376" y2="222" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="378" y="200" width="136" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="446" y="218" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">Lₜ</text>
<text x="446" y="236" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">H(tag ∥ Lₜ₋₁ ∥ commit(sₜ))</text>

<!-- Tamper evidence box -->
<rect x="530" y="116" width="130" height="128" rx="10" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="595" y="140" text-anchor="middle" font-size="12" fill="#5F5E5A">Tamper evidence</text>
<text x="595" y="162" text-anchor="middle" font-size="11" fill="#5F5E5A">Any change to</text>
<text x="595" y="178" text-anchor="middle" font-size="11" fill="#5F5E5A">any sₙ invalidates</text>
<text x="595" y="194" text-anchor="middle" font-size="11" fill="#5F5E5A">all Lₙ₊₁ … Lₜ</text>
<line x1="514" y1="178" x2="528" y2="178" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Footer -->
<text x="340" y="270" text-anchor="middle" font-size="11" fill="#5F5E5A">Deterministic Replay Theorem (§7.3): any conforming implementation given s₀ and P</text>
<text x="340" y="286" text-anchor="middle" font-size="11" fill="#5F5E5A">MUST reproduce (L₀, L₁, … Lₜ) identically. The chain is independently auditable.</text>
</svg>
