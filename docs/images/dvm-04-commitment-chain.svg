<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8892B0" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>
  </defs>

  <text x="400" y="36" font-size="16" font-weight="600" text-anchor="middle" fill="#111827">Cryptographic commitment chain and replay theorem — §7.2, §7.3</text>

  <!--
    Three rows at 800px viewBox.
    Columns:
      State:   x=20  w=100  right=120   centre=70
      Arrow1:  120→150
      Commit:  x=150 w=185  right=335   centre=242
      Arrow2:  335→360
      Ledger:  x=360 w=200  right=560   centre=460
      Tamper:  x=578 w=185  (right=763)

    Row h=74, gap=26
      Row1 y=62   mid=99
      Row2 y=162  mid=199
      Row3 y=262  mid=299

    Vert chain arrows from ledger right-of-centre at x=460:
      Row1 ledger bottom y=136 → Row2 top y=162
      Row2 ledger bottom y=236 → Row3 top y=262 (dashed)
  -->

  <!-- Column headers -->
  <text x="70"  y="56" font-size="12" font-weight="bold" text-anchor="middle" fill="#6B7280">State</text>
  <text x="242" y="56" font-size="12" font-weight="bold" text-anchor="middle" fill="#6B7280">State commitment</text>
  <text x="460" y="56" font-size="12" font-weight="bold" text-anchor="middle" fill="#6B7280">Ledger digest</text>

  <!-- ══ ROW 1 ══ -->
  <g transform="translate(20, 62)">
    <rect width="100" height="74" rx="8" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="50" y="30" font-size="22" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#065F46">s₀</text>
    <text x="50" y="54" font-size="12" text-anchor="middle" fill="#047857">Initial state</text>
  </g>

  <path d="M 120 99 L 147 99" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="134" y="91" font-size="10" text-anchor="middle" fill="#9CA3AF">commit</text>

  <g transform="translate(150, 62)">
    <rect width="185" height="74" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="92" y="26"  font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#4C1D95">commit(s₀)</text>
    <text x="92" y="46"  font-size="11" font-family="monospace" text-anchor="middle" fill="#6D28D9">DVM:STATE:v1</text>
    <text x="92" y="64"  font-size="10" font-style="italic" text-anchor="middle" fill="#7C3AED">H(tag ‖ len ‖ state)</text>
  </g>

  <path d="M 335 99 L 357 99" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="346" y="91" font-size="10" text-anchor="middle" fill="#9CA3AF">H(tag ‖ ·)</text>

  <g transform="translate(360, 62)">
    <rect width="200" height="74" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="26"  font-size="22" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">L₀</text>
    <text x="100" y="48"  font-size="11" font-family="monospace" text-anchor="middle" fill="#92400E">DVM:LEDGER:v1</text>
    <text x="100" y="64"  font-size="10" font-style="italic" text-anchor="middle" fill="#B45309">H(LEDGER:v1 ‖ commit(s₀))</text>
  </g>

  <text x="290" y="152" font-size="11" font-family="monospace" text-anchor="middle" fill="#6B7280">L₀ = H(DVM:LEDGER:v1 ‖ commit(s₀))</text>
  <path d="M 460 136 L 460 160" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ══ ROW 2 ══ -->
  <g transform="translate(20, 162)">
    <rect width="100" height="74" rx="8" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="50" y="30" font-size="22" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#065F46">s₁</text>
    <text x="50" y="54" font-size="12" text-anchor="middle" fill="#047857">Next state</text>
  </g>

  <path d="M 120 199 L 147 199" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="134" y="191" font-size="10" text-anchor="middle" fill="#9CA3AF">commit</text>

  <g transform="translate(150, 162)">
    <rect width="185" height="74" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="92" y="26"  font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#4C1D95">commit(s₁)</text>
    <text x="92" y="46"  font-size="11" font-family="monospace" text-anchor="middle" fill="#6D28D9">DVM:STATE:v1</text>
    <text x="92" y="64"  font-size="10" font-style="italic" text-anchor="middle" fill="#7C3AED">H(tag ‖ len ‖ state)</text>
  </g>

  <path d="M 335 199 L 357 199" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="346" y="191" font-size="10" text-anchor="middle" fill="#9CA3AF">H(tag ‖ L₀ ‖ ·)</text>

  <g transform="translate(360, 162)">
    <rect width="200" height="74" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="26"  font-size="22" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">L₁</text>
    <text x="100" y="48"  font-size="11" font-family="monospace" text-anchor="middle" fill="#92400E">DVM:LEDGER:v1</text>
    <text x="100" y="64"  font-size="10" font-style="italic" text-anchor="middle" fill="#B45309">H(LEDGER:v1 ‖ L₀ ‖ commit(s₁))</text>
  </g>

  <text x="290" y="252" font-size="11" font-family="monospace" text-anchor="middle" fill="#6B7280">L₁ = H(DVM:LEDGER:v1 ‖ L₀ ‖ commit(s₁))</text>
  <path d="M 460 236 L 460 260" stroke="#8892B0" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="474" y="250" font-size="13" fill="#9CA3AF">⋮</text>

  <!-- ══ ROW 3 ══ -->
  <g transform="translate(20, 262)">
    <rect width="100" height="74" rx="8" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="50" y="30" font-size="22" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#065F46">sₜ</text>
    <text x="50" y="54" font-size="12" text-anchor="middle" fill="#047857">State at step t</text>
  </g>

  <path d="M 120 299 L 147 299" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="134" y="291" font-size="10" text-anchor="middle" fill="#9CA3AF">commit</text>

  <g transform="translate(150, 262)">
    <rect width="185" height="74" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="92" y="26"  font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#4C1D95">commit(sₜ)</text>
    <text x="92" y="46"  font-size="11" font-family="monospace" text-anchor="middle" fill="#6D28D9">DVM:STATE:v1</text>
    <text x="92" y="64"  font-size="10" font-style="italic" text-anchor="middle" fill="#7C3AED">H(tag ‖ len ‖ state)</text>
  </g>

  <path d="M 335 299 L 357 299" stroke="#8892B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="346" y="291" font-size="10" text-anchor="middle" fill="#9CA3AF">H(tag ‖ Lₜ₋₁ ‖ ·)</text>

  <g transform="translate(360, 262)">
    <rect width="200" height="74" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="26"  font-size="22" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#78350F">Lₜ</text>
    <text x="100" y="48"  font-size="11" font-family="monospace" text-anchor="middle" fill="#92400E">DVM:LEDGER:v1</text>
    <text x="100" y="64"  font-size="10" font-style="italic" text-anchor="middle" fill="#B45309">H(LEDGER:v1 ‖ Lₜ₋₁ ‖ commit(sₜ))</text>
  </g>

  <!-- Tamper evidence callout -->
  <rect x="578" y="62" width="185" height="274" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5" stroke-dasharray="6 4" filter="url(#shadow)"/>
  <text x="670" y="88"  font-size="13" font-weight="bold" text-anchor="middle" fill="#9A3412">Tamper evidence</text>
  <line x1="594" y1="98" x2="747" y2="98" stroke="#FDBA74" stroke-width="0.75"/>
  <text x="670" y="120" font-size="12" text-anchor="middle" fill="#78350F">Any change to any sₙ</text>
  <text x="670" y="138" font-size="12" text-anchor="middle" fill="#78350F">produces a different</text>
  <text x="670" y="158" font-size="13" font-family="monospace" text-anchor="middle" fill="#B45309">commit(sₙ)</text>
  <text x="670" y="178" font-size="12" text-anchor="middle" fill="#78350F">which invalidates</text>
  <text x="670" y="198" font-size="13" font-family="monospace" text-anchor="middle" fill="#B45309">Lₙ, Lₙ₊₁ … Lₜ</text>
  <text x="670" y="222" font-size="12" text-anchor="middle" fill="#78350F">Detectable without</text>
  <text x="670" y="240" font-size="12" text-anchor="middle" fill="#78350F">any shared secret</text>
  <text x="670" y="270" font-size="11" font-style="italic" text-anchor="middle" fill="#9A3412">No trusted third party</text>
  <text x="670" y="286" font-size="11" font-style="italic" text-anchor="middle" fill="#9A3412">required</text>

  <!-- Leader from ledger column to tamper box -->
  <path d="M 560 199 L 576 199" stroke="#FDBA74" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Replay theorem footer box -->
  <rect x="20" y="362" width="740" height="76" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="390" y="385" font-size="13" font-weight="bold" text-anchor="middle" fill="#1E293B">Deterministic Replay Theorem — §7.3</text>
  <text x="390" y="406" font-size="12" text-anchor="middle" fill="#374151">Any conforming implementation given identical s₀ and P MUST reproduce</text>
  <text x="390" y="424" font-size="12" text-anchor="middle" fill="#374151">(L₀, L₁, … Lₜ) byte-identically. The chain is independently auditable by any party.</text>

  <text x="400" y="465" font-size="12" font-style="italic" text-anchor="middle" fill="#6B7280">Certification review, regulatory audit, and multi-party verification require no shared secrets.</text>
</svg>
