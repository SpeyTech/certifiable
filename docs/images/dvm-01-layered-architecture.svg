<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- background -->
<rect x="40" y="30" width="600" height="360" rx="16" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="20" text-anchor="middle" font-size="12" fill="#5F5E5A">DVM layered specification model (§1.4)</text>

<!-- Specification layer -->
<rect x="70" y="50" width="560" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="80" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Specification layer</text>
<text x="340" y="100" text-anchor="middle" font-size="12" fill="#0F6E56">DVM-SPEC-001 — normative invariants, arithmetic contracts, oracle boundary</text>

<!-- arrow -->
<line x1="340" y1="122" x2="340" y2="152" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="358" y="141" font-size="11" fill="#5F5E5A" dominant-baseline="central">MUST conform</text>

<!-- Implementation layer -->
<rect x="70" y="155" width="560" height="72" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="185" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Implementation layer</text>
<text x="340" y="205" text-anchor="middle" font-size="12" fill="#534AB7">libdvm (C99) — dvm_* primitives, Q16.16 arithmetic, SHA-256 commitments</text>

<!-- arrow -->
<line x1="340" y1="227" x2="340" y2="257" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="358" y="246" font-size="11" fill="#5F5E5A" dominant-baseline="central">MUST depend only on conforming impl.</text>

<!-- Application layer boxes -->
<rect x="70" y="260" width="175" height="100" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="158" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">certifiable-*</text>
<text x="158" y="320" text-anchor="middle" font-size="12" fill="#854F0B">ML pipelines</text>

<rect x="253" y="260" width="175" height="100" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="341" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">certifiable-aero</text>
<text x="341" y="320" text-anchor="middle" font-size="12" fill="#854F0B">Avionics / DO-178C</text>

<rect x="436" y="260" width="175" height="100" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="524" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">certifiable-fin</text>
<text x="524" y="320" text-anchor="middle" font-size="12" fill="#854F0B">Financial settlement</text>

<text x="340" y="395" text-anchor="middle" font-size="11" fill="#5F5E5A">Application layer — independent deployments; implementation isolation preserved</text>
</svg>
